<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading PAC Terminal v3.5.4</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { font-family: sans-serif; background: #0b0e11; color: #eaecef; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .card { background: #181a20; border-radius: 16px; padding: 20px; width: 100%; max-width: 420px; border: 1px solid #2b3139; }
        .version { font-size: 10px; color: #5e6673; text-align: right; margin-bottom: 5px; }
        .search-box { display: flex; gap: 5px; margin-bottom: 15px; }
        input { flex: 1; background: #2b3139; border: 1px solid #48515d; color: white; padding: 10px; border-radius: 6px; font-size: 14px; }
        .btn-vai { background: #f0b90b; color: #000; border: none; padding: 0 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        #assetName { font-size: 1.2em; font-weight: bold; color: #f0b90b; margin: 0; }
        #isinTicker { color: #848e9c; font-size: 0.85em; margin-bottom: 10px; }
        #chart { width: 100%; height: 320px; background: #000; border-radius: 8px; border: 1px solid #2b3139; }
        .nav { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-nav { background: #2b3139; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #status { font-family: monospace; font-size: 11px; color: #0c0; background: #000; padding: 10px; margin-top: 15px; border-radius: 6px; border: 1px solid #222; min-height: 20px; }
    </style>
</head>
<body>
<div class="card">
    <div class="version">v3.5.4</div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Cerca ISIN o Ticker...">
        <button class="btn-vai" onclick="cerca()">VAI</button>
    </div>
    <p id="assetName">In attesa dati...</p>
    <div id="isinTicker">--- | ---</div>
    <div id="chart"></div>
    <div class="nav">
        <button class="btn-nav" onclick="naviga(-1)">⬅ PREC</button>
        <button class="btn-nav" onclick="naviga(1)">SUCC ➡</button>
    </div>
    <div id="status">Inizializzazione...</div>
</div>

<script>
    let stockData = [];
    let idx = 0;
    let chart, series;

    // 1. Inizializza subito il grafico
    function setupChart() {
        const chartEl = document.getElementById('chart');
        chart = LightweightCharts.createChart(chartEl, {
            layout: { backgroundColor: '#000', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#111' }, horzLines: { color: '#111' } },
            timeScale: { borderColor: '#333' },
        });
        series = chart.addCandlestickSeries({ upColor: '#0ecb81', downColor: '#f6465d' });
    }

    // 2. Carica i dati dal file tr_isin_ticker.csv
    async function loadCSV() {
        try {
            const res = await fetch('tr_isin_ticker.csv');
            if (!res.ok) throw new Error("File CSV non trovato sul server");
            const text = await res.text();
            const lines = text.split('\n').filter(l => l.trim().length > 0);
            const head = lines[0].split(',').map(h => h.trim().toLowerCase());
            
            stockData = lines.slice(1).map(l => {
                const c = l.split(',').map(v => v.trim());
                return {
                    isin: c[head.indexOf('isin')] || "",
                    ticker: c[head.indexOf('ticker')] || "",
                    name: c[head.indexOf('name')] || c[head.indexOf('ticker')]
                };
            }).filter(s => s.ticker && s.ticker !== "NaN");

            document.getElementById('status').innerText = `Database: ${stockData.length} titoli`;
            aggiornaTitolo();
        } catch (e) {
            document.getElementById('status').style.color = 'red';
            document.getElementById('status').innerText = "ERRORE: " + e.message;
        }
    }

    async function aggiornaTitolo() {
        if (stockData.length === 0) return;
        const s = stockData[idx];
        document.getElementById('assetName').innerText = s.name;
        document.getElementById('isinTicker').innerText = `${s.isin} | ${s.ticker} (${idx + 1}/${stockData.length})`;
        
        // Scarica candele da Yahoo
        const proxy = "https://corsproxy.io/?";
        const yahoo = encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${s.ticker}?range=1y&interval=1d`);
        
        try {
            const r = await fetch(proxy + yahoo);
            const d = await r.json();
            const quotes = d.chart.result[0];
            const candles = quotes.timestamp.map((t, i) => ({
                time: t,
                open: quotes.indicators.quote[0].open[i],
                high: quotes.indicators.quote[0].high[i],
                low: quotes.indicators.quote[0].low[i],
                close: quotes.indicators.quote[0].close[i]
            })).filter(c => c.open != null);

            series.setData(candles);
            chart.timeScale().fitContent();
        } catch (err) {
            document.getElementById('status').innerText = "Errore dati per: " + s.ticker;
        }
    }

    function naviga(dir) {
        idx = (idx + dir + stockData.length) % stockData.length;
        aggiornaTitolo();
    }

    function cerca() {
        const val = document.getElementById('searchInput').value.trim().toUpperCase();
        if (!val) return;
        const found = stockData.findIndex(s => s.isin.toUpperCase() === val || s.ticker.toUpperCase() === val);
        if (found !== -1) {
            idx = found;
            aggiornaTitolo();
        } else {
            alert("Titolo non trovato");
        }
    }

    setupChart();
    loadCSV();
</script>
</body>
</html>
