<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading PAC v3.5.6</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { font-family: sans-serif; background: #0b0e11; color: #eaecef; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .card { background: #181a20; border-radius: 16px; padding: 20px; width: 100%; max-width: 420px; border: 1px solid #2b3139; }
        .version { font-size: 10px; color: #5e6673; text-align: right; }
        .search-box { display: flex; gap: 5px; margin: 15px 0; }
        input { flex: 1; background: #2b3139; border: 1px solid #48515d; color: white; padding: 10px; border-radius: 6px; }
        .btn-vai { background: #f0b90b; color: #000; border: none; padding: 0 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        #assetName { font-size: 1.2em; font-weight: bold; color: #f0b90b; margin: 0; }
        #isinTicker { color: #848e9c; font-size: 0.85em; margin-bottom: 10px; }
        #chart { width: 100%; height: 320px; background: #000; border-radius: 8px; border: 1px solid #2b3139; }
        .nav { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-nav { background: #2b3139; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #status { font-family: monospace; font-size: 11px; color: #0c0; background: #000; padding: 10px; margin-top: 15px; border-radius: 6px; border: 1px solid #222; }
    </style>
</head>
<body>
<div class="card">
    <div class="version">v3.5.6</div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="ISIN o Ticker...">
        <button class="btn-vai" onclick="cerca()">VAI</button>
    </div>
    <p id="assetName">Caricamento...</p>
    <div id="isinTicker">--- | ---</div>
    <div id="chart"></div>
    <div class="nav">
        <button class="btn-nav" onclick="naviga(-1)">⬅ PREC</button>
        <button class="btn-nav" onclick="naviga(1)">SUCC ➡</button>
    </div>
    <div id="status">Avvio in corso...</div>
</div>

<script>
    let stockData = [];
    let idx = 0;
    let chart, series;

    // Funzione di log immediata
    function log(msg, err = false) {
        const s = document.getElementById('status');
        s.innerText = msg;
        s.style.color = err ? '#f6465d' : '#0c0';
        console.log(msg);
    }

    // Inizializzazione Manuale
    async function start() {
        log("1. Inizializzo Grafico...");
        try {
            const chartEl = document.getElementById('chart');
            chart = LightweightCharts.createChart(chartEl, {
                layout: { backgroundColor: '#000', textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#111' }, horzLines: { color: '#111' } },
                timeScale: { borderColor: '#333' }
            });
            series = chart.addCandlestickSeries({ upColor: '#0ecb81', downColor: '#f6465d' });
            log("2. Grafico OK. Carico CSV...");
            
            const res = await fetch('tr_isin_ticker.csv?nocache=' + Date.now());
            if (!res.ok) throw new Error("File CSV non trovato");
            
            const text = await res.text();
            const lines = text.split('\n').filter(l => l.trim().length > 0);
            const head = lines[0].split(',').map(h => h.trim().toLowerCase());
            
            stockData = lines.slice(1).map(l => {
                const c = l.split(',').map(v => v.trim());
                return {
                    isin: c[head.indexOf('isin')] || "",
                    ticker: c[head.indexOf('ticker')] || "",
                    name: c[head.indexOf('name')] || c[head.indexOf('ticker')]
                };
            }).filter(s => s.ticker && s.ticker !== "NaN");

            log(`3. Database Pronto: ${stockData.length} titoli`);
            aggiornaTitolo();
        } catch (e) {
            log("ERRORE: " + e.message, true);
        }
    }

    async function aggiornaTitolo() {
        if (stockData.length === 0) return;
        const s = stockData[idx];
        document.getElementById('assetName').innerText = s.name;
        document.getElementById('isinTicker').innerText = `${s.isin} | ${s.ticker} (${idx + 1}/${stockData.length})`;
        
        log(`Yahoo: ${s.ticker}...`);
        try {
            const r = await fetch(`https://corsproxy.io/?${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+s.ticker+'?range=1y&interval=1d')}`);
            const d = await r.json();
            const q = d.chart.result[0];
            const candles = q.timestamp.map((t, i) => ({
                time: t,
                open: q.indicators.quote[0].open[i],
                high: q.indicators.quote[0].high[i],
                low: q.indicators.quote[0].low[i],
                close: q.indicators.quote[0].close[i]
            })).filter(c => c.open != null);

            series.setData(candles);
            chart.timeScale().fitContent();
            log("Dati caricati.");
        } catch (err) {
            log("Errore Yahoo per " + s.ticker, true);
        }
    }

    function naviga(dir) {
        if (stockData.length === 0) return;
        idx = (idx + dir + stockData.length) % stockData.length;
        aggiornaTitolo();
    }

    function cerca() {
        const val = document.getElementById('searchInput').value.trim().toUpperCase();
        const f = stockData.findIndex(s => s.isin.toUpperCase() === val || s.ticker.toUpperCase() === val);
        if (f !== -1) { idx = f; aggiornaTitolo(); } else { alert("Non trovato"); }
    }

    // Partenza forzata
    window.onload = start;
</script>
</body>
</html>
