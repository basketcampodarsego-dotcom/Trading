<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Terminal v3.5.2</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #0b0e11; color: #eaecef; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; }
        .card { background: #181a20; border-radius: 16px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); border: 1px solid #2b3139; }
        .info-header { margin-bottom: 15px; }
        #assetName { font-size: 1.3em; font-weight: bold; color: #f0b90b; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #isinTicker { color: #848e9c; font-size: 0.9em; margin-top: 5px; }
        #chart { width: 100%; height: 350px; margin: 15px 0; border-radius: 8px; background: #0b0e11; }
        .nav-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        button { background: #2b3139; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 1em; cursor: pointer; }
        button:active { background: #3b424c; transform: scale(0.98); }
        .counter { text-align: center; color: #5e6673; font-size: 0.8em; margin-top: 15px; }
        .error-msg { color: #f6465d; background: rgba(246, 70, 93, 0.1); padding: 10px; border-radius: 8px; text-align: center; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="card">
        <div id="errorBox" class="error-msg">File 'tr_isin_tickers.csv' non trovato nel repository</div>
        
        <div class="info-header">
            <p id="assetName">Caricamento dati...</p>
            <div id="isinTicker">--- | ---</div>
        </div>
        
        <div id="chart"></div>

        <div class="nav-buttons">
            <button onclick="navigate(-1)">⬅ PRECEDENTE</button>
            <button onclick="navigate(1)">SUCCESSIVO ➡</button>
        </div>
        
        <div id="posCounter" class="counter">0 / 0</div>
    </div>
</div>

<script>
    let stockList = [];
    let currentIndex = 0;
    let chart, candleSeries;

    function initChart() {
        chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { backgroundColor: '#181a20', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#2b3139' }, horzLines: { color: '#2b3139' } },
            timeScale: { borderColor: '#48515d' },
        });
        candleSeries = chart.addCandlestickSeries({
            upColor: '#0ecb81', downColor: '#f6465d',
            borderVisible: false, wickUpColor: '#0ecb81', wickDownColor: '#f6465d'
        });
    }

    async function loadData() {
        try {
            // Utilizzo del nome esatto confermato: tr_isin_tickers.csv
            const response = await fetch('tr_isin_tickers.csv');
            if (!response.ok) throw new Error();
            
            const text = await response.text();
            const lines = text.split('\n').filter(l => l.trim().length > 0);
            const headers = lines[0].split(',').map(h => h.trim().toLowerCase());

            stockList = lines.slice(1).map(line => {
                const cols = line.split(',');
                return {
                    isin: cols[headers.indexOf('isin')],
                    ticker: cols[headers.indexOf('ticker')],
                    name: cols[headers.indexOf('name')] || cols[headers.indexOf('ticker')]
                };
            }).filter(s => s.ticker && s.ticker !== "NaN");

            if (stockList.length > 0) {
                renderStock();
            }
        } catch (e) {
            document.getElementById('errorBox').style.display = 'block';
            document.getElementById('assetName').innerText = "Errore Database";
        }
    }

    async function renderStock() {
        const stock = stockList[currentIndex];
        document.getElementById('assetName').innerText = stock.name;
        document.getElementById('isinTicker').innerText = `${stock.isin} | ${stock.ticker}`;
        document.getElementById('posCounter').innerText = `${currentIndex + 1} / ${stockList.length}`;

        fetchYahooData(stock.ticker);
    }

    async function fetchYahooData(ticker) {
        const proxy = "https://corsproxy.io/?";
        const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?range=1y&interval=1d`;
        
        try {
            const r = await fetch(proxy + encodeURIComponent(url));
            const d = await r.json();
            const result = d.chart.result[0];
            const prices = result.timestamp.map((t, i) => ({
                time: t,
                open: result.indicators.quote[0].open[i],
                high: result.indicators.quote[0].high[i],
                low: result.indicators.quote[0].low[i],
                close: result.indicators.quote[0].close[i]
            })).filter(p => p.open != null);

            candleSeries.setData(prices);
            chart.timeScale().fitContent();
        } catch (err) {
            console.error("Errore Yahoo per:", ticker);
        }
    }

    function navigate(step) {
        currentIndex += step;
        if (currentIndex < 0) currentIndex = 0;
        if (currentIndex >= stockList.length) currentIndex = stockList.length - 1;
        renderStock();
    }

    initChart();
    loadData();
</script>
</body>
</html>
