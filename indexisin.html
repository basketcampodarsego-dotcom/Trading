<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAC Terminal v3.5.2</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { font-family: sans-serif; background: #0b0e11; color: #eaecef; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .card { background: #181a20; border-radius: 16px; padding: 20px; width: 100%; max-width: 400px; border: 1px solid #2b3139; }
        #assetName { font-size: 1.2em; font-weight: bold; color: #f0b90b; margin: 0; }
        #isinTicker { color: #848e9c; font-size: 0.85em; margin-bottom: 10px; }
        #chart { width: 100%; height: 320px; background: #000; border-radius: 8px; margin: 10px 0; }
        .nav { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { background: #2b3139; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #status { font-size: 0.7em; color: #555; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
<div class="card">
    <p id="assetName">Verifica file...</p>
    <div id="isinTicker">--- | ---</div>
    <div id="chart"></div>
    <div class="nav">
        <button onclick="navigate(-1)">⬅ PREC</button>
        <button onclick="navigate(1)">SUCC ➡</button>
    </div>
    <div id="status">In attesa di tr_isin_ticker.csv</div>
</div>

<script>
    let db = [];
    let cursor = 0;
    let chart, candleSeries;

    function initChart() {
        chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { backgroundColor: '#000', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#111' }, horzLines: { color: '#111' } },
        });
        candleSeries = chart.addCandlestickSeries({ upColor: '#0ecb81', downColor: '#f6465d' });
    }

    async function loadData() {
        try {
            // Cerco il file nel tuo repository Trading
            const response = await fetch('tr_isin_ticker.csv');
            if (!response.ok) throw new Error("File CSV non trovato");
            
            const text = await response.text();
            const rows = text.split('\n').map(r => r.trim()).filter(r => r.length > 0);
            
            // Gestione automatica intestazioni (maiuscole/minuscole)
            const headers = rows[0].split(',').map(h => h.trim().toLowerCase());
            const iIsin = headers.indexOf('isin');
            const iTick = headers.indexOf('ticker');
            const iName = headers.indexOf('name');

            db = rows.slice(1).map(row => {
                const c = row.split(',').map(v => v.trim());
                return {
                    isin: c[iIsin],
                    ticker: c[iTick],
                    name: c[iName] || c[iTick]
                };
            }).filter(item => item.ticker && item.ticker !== "NaN");

            if (db.length === 0) throw new Error("CSV vuoto");
            
            updateUI();
        } catch (e) {
            document.getElementById('assetName').innerText = "ERRORE";
            document.getElementById('status').innerText = e.message;
        }
    }

    function updateUI() {
        const item = db[cursor];
        document.getElementById('assetName').innerText = item.name;
        document.getElementById('isinTicker').innerText = `${item.isin} | ${item.ticker}`;
        document.getElementById('status').innerText = `Titolo ${cursor + 1} di ${db.length}`;
        fetchYahoo(item.ticker);
    }

    async function fetchYahoo(ticker) {
        const url = `https://corsproxy.io/?${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+ticker+'?range=1y&interval=1d')}`;
        try {
            const r = await fetch(url);
            const d = await r.json();
            const res = d.chart.result[0];
            const p = res.timestamp.map((t, i) => ({
                time: t, open: res.indicators.quote[0].open[i], high: res.indicators.quote[0].high[i],
                low: res.indicators.quote[0].low[i], close: res.indicators.quote[0].close[i]
            })).filter(x => x.open != null);
            candleSeries.setData(p);
            chart.timeScale().fitContent();
        } catch (e) { console.error("Yahoo Error"); }
    }

    function navigate(d) {
        cursor = (cursor + d + db.length) % db.length;
        updateUI();
    }

    initChart();
    loadData();
</script>
</body>
</html>
