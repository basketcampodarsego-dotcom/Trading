<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading PAC Pro</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0b0e11; color: #eaecef; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .card { background: #181a20; border-radius: 16px; padding: 20px; width: 100%; max-width: 400px; border: 1px solid #2b3139; }
        #assetName { font-size: 1.2em; font-weight: bold; color: #f0b90b; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #isinTicker { color: #848e9c; font-size: 0.85em; margin-bottom: 10px; }
        #chart { width: 100%; height: 320px; background: #000; border-radius: 8px; margin: 10px 0; }
        .nav { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { background: #2b3139; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        button:active { background: #3b424c; }
        #debug { font-family: monospace; font-size: 10px; color: #0c0; background: #000; padding: 8px; margin-top: 10px; border-radius: 4px; height: 60px; overflow: hidden; }
    </style>
</head>
<body>
<div class="card">
    <p id="assetName">Caricamento...</p>
    <div id="isinTicker">--- | ---</div>
    <div id="chart"></div>
    <div class="nav">
        <button onclick="navigate(-1)">⬅ PREC</button>
        <button onclick="navigate(1)">SUCC ➡</button>
    </div>
    <div id="debug">Inizializzazione...</div>
</div>

<script>
    let db = [];
    let cursor = 0;
    let chart, candleSeries;

    function log(m) { document.getElementById('debug').innerHTML = m; }

    function initChart() {
        chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { backgroundColor: '#000', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#111' }, horzLines: { color: '#111' } },
            timeScale: { borderColor: '#333' }
        });
        candleSeries = chart.addCandlestickSeries({ upColor: '#0ecb81', downColor: '#f6465d' });
    }

    async function loadData() {
        try {
            const r = await fetch('tr_isin_ticker.csv');
            const t = await r.text();
            const rows = t.split('\n').filter(l => l.trim().length > 0);
            const h = rows[0].split(',').map(x => x.trim().toLowerCase());
            
            db = rows.slice(1).map(row => {
                const c = row.split(',').map(v => v.trim());
                return { isin: c[h.indexOf('isin')], ticker: c[h.indexOf('ticker')], name: c[h.indexOf('name')] || c[h.indexOf('ticker')] };
            }).filter(i => i.ticker && i.ticker !== "NaN");

            log(`DB Pronto: ${db.length} titoli.`);
            updateUI();
        } catch (e) { log("Errore CSV: " + e.message); }
    }

    function updateUI() {
        const item = db[cursor];
        document.getElementById('assetName').innerText = item.name;
        document.getElementById('isinTicker').innerText = `${item.isin} | ${item.ticker}`;
        fetchYahoo(item.ticker);
    }

    async function fetchYahoo(ticker) {
        log(`Richiedo ${ticker}...`);
        const url = `https://corsproxy.io/?${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+ticker+'?range=1y&interval=1d')}`;
        try {
            const r = await fetch(url);
            const d = await r.json();
            if (d.chart.result) {
                const res = d.chart.result[0];
                const p = res.timestamp.map((t, i) => ({
                    time: t, 
                    open: res.indicators.quote[0].open[i], high: res.indicators.quote[0].high[i],
                    low: res.indicators.quote[0].low[i], close: res.indicators.quote[0].close[i]
                })).filter(x => x.open != null);
                
                candleSeries.setData(p);
                chart.timeScale().fitContent();
                log(`${ticker}: OK (${p.length} candele)`);
            } else {
                log(`${ticker}: Nessun dato da Yahoo`);
            }
        } catch (e) { log(`${ticker}: Errore caricamento`); }
    }

    function navigate(d) {
        cursor = (cursor + d + db.length) % db.length;
        updateUI();
    }

    initChart();
    loadData();
</script>
</body>
</html>
