<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading PAC v3.5.2</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { font-family: sans-serif; background: #0b0e11; color: #eaecef; margin: 0; padding: 10px; text-align: center; }
        .card { background: #181a20; border-radius: 16px; padding: 20px; max-width: 400px; margin: auto; border: 1px solid #2b3139; }
        #assetName { font-size: 1.2em; font-weight: bold; color: #f0b90b; margin: 0; }
        #isinTicker { color: #848e9c; font-size: 0.85em; margin-bottom: 10px; }
        #chart { width: 100%; height: 300px; background: #000; border-radius: 8px; margin: 10px 0; }
        .nav { display: flex; justify-content: space-between; gap: 10px; margin-top: 15px; }
        button { flex: 1; background: #2b3139; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #statusLog { font-size: 0.7em; color: #5e6673; margin-top: 10px; background: #000; padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="card">
    <p id="assetName">Inizializzazione...</p>
    <div id="isinTicker">--- | ---</div>
    
    <div id="chart"></div>

    <div class="nav">
        <button onclick="navigate(-1)">⬅ PREC</button>
        <button onclick="navigate(1)">SUCC ➡</button>
    </div>
    
    <div id="statusLog">Verifica file CSV in corso...</div>
</div>

<script>
    let stockList = [];
    let currentIndex = 0;
    let chart, candleSeries;

    function log(msg) { document.getElementById('statusLog').innerText = msg; }

    function initChart() {
        chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { backgroundColor: '#000', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#111' }, horzLines: { color: '#111' } },
        });
        candleSeries = chart.addCandlestickSeries({ upColor: '#0ecb81', downColor: '#f6465d' });
    }

    async function loadData() {
        try {
            log("Scarico tr_isin_tickers.csv...");
            const response = await fetch('tr_isin_tickers.csv');
            
            if (!response.ok) {
                log("ERRORE: File tr_isin_tickers.csv non trovato nel repo!");
                return;
            }

            const text = await response.text();
            const lines = text.split('\n').filter(l => l.trim().length > 0);
            const headers = lines[0].split(',').map(h => h.trim().toLowerCase());

            stockList = lines.slice(1).map(line => {
                const cols = line.split(',');
                return {
                    isin: cols[headers.indexOf('isin')],
                    ticker: cols[headers.indexOf('ticker')],
                    name: cols[headers.indexOf('name')] || cols[headers.indexOf('ticker')]
                };
            }).filter(s => s.ticker && s.ticker !== "NaN");

            log("Caricati " + stockList.length + " titoli.");
            renderStock();
        } catch (e) {
            log("Errore tecnico: " + e.message);
        }
    }

    function renderStock() {
        const s = stockList[currentIndex];
        document.getElementById('assetName').innerText = s.name;
        document.getElementById('isinTicker').innerText = s.isin + " | " + s.ticker;
        fetchYahoo(s.ticker);
    }

    async function fetchYahoo(ticker) {
        const url = `https://corsproxy.io/?${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+ticker+'?range=1y&interval=1d')}`;
        try {
            const r = await fetch(url);
            const d = await r.json();
            const res = d.chart.result[0];
            const p = res.timestamp.map((t, i) => ({
                time: t, open: res.indicators.quote[0].open[i], high: res.indicators.quote[0].high[i],
                low: res.indicators.quote[0].low[i], close: res.indicators.quote[0].close[i]
            })).filter(x => x.open != null);
            candleSeries.setData(p);
            chart.timeScale().fitContent();
        } catch (e) { log("Errore grafico per " + ticker); }
    }

    function navigate(d) {
        currentIndex = (currentIndex + d + stockList.length) % stockList.length;
        renderStock();
    }

    initChart();
    loadData();
</script>
</body>
</html>
