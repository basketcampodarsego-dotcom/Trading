<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading PAC v3.5.9 - Multi EMA</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { font-family: sans-serif; background: #0b0e11; color: #eaecef; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .card { background: #181a20; border-radius: 16px; padding: 20px; width: 100%; max-width: 420px; border: 1px solid #2b3139; }
        .version { font-size: 10px; color: #5e6673; text-align: right; }
        .search-box { display: flex; gap: 5px; margin: 15px 0; }
        input { flex: 1; background: #2b3139; border: 1px solid #48515d; color: white; padding: 10px; border-radius: 6px; font-size: 14px; }
        .btn-vai { background: #f0b90b; color: #000; border: none; padding: 0 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        #assetName { font-size: 1.2em; font-weight: bold; color: #f0b90b; margin: 0; }
        #isinTicker { color: #848e9c; font-size: 0.85em; margin-bottom: 5px; }
        
        /* Legenda EMA */
        .ema-legend { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; font-size: 9px; margin-bottom: 10px; font-family: monospace; }
        .e10 { color: #00ff00; } .e25 { color: #ffff00; } .e50 { color: #ff0000; }
        .e100 { color: #ffffff; } .e200 { color: #bf00ff; }

        #chart { width: 100%; height: 320px; background: #000; border-radius: 8px; border: 1px solid #2b3139; }
        .nav { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-nav { background: #2b3139; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #status { font-family: monospace; font-size: 10px; color: #0c0; background: #000; padding: 8px; margin-top: 10px; border-radius: 6px; border: 1px solid #222; }
    </style>
</head>
<body>
<div class="card">
    <div class="version">v3.5.9</div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="ISIN o Ticker...">
        <button class="btn-vai" onclick="cerca()">VAI</button>
    </div>
    <p id="assetName">Inizializzazione...</p>
    <div id="isinTicker">--- | ---</div>
    
    <div class="ema-legend">
        <span class="e10">● EMA 10</span>
        <span class="e25">● EMA 25</span>
        <span class="e50">● EMA 50</span>
        <span class="e100">● EMA 100</span>
        <span class="e200">● EMA 200</span>
    </div>

    <div id="chart"></div>
    
    <div class="nav">
        <button class="btn-nav" onclick="naviga(-1)">⬅ PREC</button>
        <button class="btn-nav" onclick="naviga(1)">SUCC ➡</button>
    </div>
    <div id="status">Ready.</div>
</div>

<script>
    let stockData = [];
    let idx = 0;
    let chart, candleSeries, emas = {};

    function log(msg, err = false) {
        const s = document.getElementById('status');
        s.innerText = msg;
        s.style.color = err ? '#f6465d' : '#0c0';
    }

    function calculateEMA(data, period) {
        const k = 2 / (period + 1);
        let emaData = [];
        let prevEma = data[0].close;
        for (let i = 0; i < data.length; i++) {
            const emaVal = data[i].close * k + prevEma * (1 - k);
            emaData.push({ time: data[i].time, value: emaVal });
            prevEma = emaVal;
        }
        return emaData;
    }

    async function start() {
        try {
            const chartEl = document.getElementById('chart');
            chart = LightweightCharts.createChart(chartEl, {
                layout: { background: { color: '#000' }, textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#111' }, horzLines: { color: '#111' } },
                timeScale: { borderColor: '#333' }
            });

            candleSeries = chart.addCandlestickSeries({
                upColor: '#0ecb81', downColor: '#f6465d', borderVisible: false,
                wickUpColor: '#0ecb81', wickDownColor: '#f6465d'
            });

            // Configurazione EMA richieste
            const config = [
                {p: 10, c: '#00ff00'}, {p: 25, c: '#ffff00'}, {p: 50, c: '#ff0000'},
                {p: 100, c: '#ffffff'}, {p: 200, c: '#bf00ff'}
            ];
            
            config.forEach(conf => {
                emas[conf.p] = chart.addLineSeries({ color: conf.c, lineWidth: 1, lastValueVisible: false, priceLineVisible: false });
            });

            const res = await fetch('tr_isin_ticker.csv?v=' + Date.now());
            const text = await res.text();
            const lines = text.split('\n').filter(l => l.trim().length > 0);
            const head = lines[0].split(',').map(h => h.trim().toLowerCase());
            
            stockData = lines.slice(1).map(l => {
                const c = l.split(',').map(v => v.trim());
                return { isin: c[head.indexOf('isin')], ticker: c[head.indexOf('ticker')], name: c[head.indexOf('name')] };
            }).filter(s => s.ticker);

            log(`DB: ${stockData.length} titoli.`);
            aggiornaTitolo();
        } catch (e) { log("Errore avvio: " + e.message, true); }
    }

    async function aggiornaTitolo() {
        if (stockData.length === 0) return;
        const s = stockData[idx];
        document.getElementById('assetName').innerText = s.name;
        document.getElementById('isinTicker').innerText = `${s.isin} | ${s.ticker}`;
        
        log(`Yahoo: ${s.ticker}...`);
        try {
            const r = await fetch(`https://corsproxy.io/?${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+s.ticker+'?range=2y&interval=1d')}`);
            const d = await r.json();
            const q = d.chart.result[0];
            const candles = q.timestamp.map((t, i) => ({
                time: t,
                open: q.indicators.quote[0].open[i], high: q.indicators.quote[0].high[i],
                low: q.indicators.quote[0].low[i], close: q.indicators.quote[0].close[i]
            })).filter(c => c.open != null);

            candleSeries.setData(candles);
            
            // Calcolo dinamico per tutte le EMA
            [10, 25, 50, 100, 200].forEach(p => {
                if (candles.length > p) {
                    emas[p].setData(calculateEMA(candles, p));
                } else {
                    emas[p].setData([]);
                }
            });

            chart.timeScale().fitContent();
            log("Dati e EMA caricati.");
        } catch (err) { log("Errore dati", true); }
    }

    function naviga(dir) {
        idx = (idx + dir + stockData.length) % stockData.length;
        aggiornaTitolo();
    }

    function cerca() {
        const val = document.getElementById('searchInput').value.trim().toUpperCase();
        const f = stockData.findIndex(s => s.isin.toUpperCase() === val || s.ticker.toUpperCase() === val);
        if (f !== -1) { idx = f; aggiornaTitolo(); } else { alert("Non trovato"); }
    }

    window.onload = start;
</script>
</body>
</html>
