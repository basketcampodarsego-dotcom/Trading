<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAC Terminal Pro</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 15px; }
        .card { background: #1e1e1e; border-radius: 12px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .nav-btn { background: #2962ff; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; }
        #chart { width: 100%; height: 350px; margin: 15px 0; background: #1e1e1e; border-radius: 8px; }
        .pac-info { padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 0.9em; }
        .warning { background: #b71c1c; color: white; border-left: 5px solid #ff5252; }
        .normal { background: #2c2c2c; color: #aaa; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.85em; }
        .stat-box { background: #262626; padding: 8px; border-radius: 5px; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <button class="nav-btn" onclick="change(1)">Successivo ➡</button>
        <div style="text-align:right">
            <div id="isinDisplay" style="font-weight:bold; color:#4dadff;">ISIN</div>
            <div id="tickerDisplay" style="font-size:0.8em; color:#888;">TICKER</div>
        </div>
    </div>

    <div id="pacBanner" class="pac-info normal">Nessun dato PAC trovato</div>
    
    <div id="chart"></div>

    <div class="stats">
        <div class="stat-box">Prezzo: <b id="p-val">-</b></div>
        <div class="stat-box">P/E: <b id="pe-val">-</b></div>
        <div class="stat-box">Cap: <b id="cap-val">-</b></div>
        <div class="stat-box">Borsa: <b id="exch-val">-</b></div>
    </div>
</div>

<script>
    let chart, candleSeries;
    let items = ["US5949181045", "JP3811000003"]; // Qui verranno caricati i tuoi 13.000 ISIN
    let idx = 0;

    async function loadStock(isin) {
        const proxy = "https://corsproxy.io/?";
        try {
            const sUrl = `https://query2.finance.yahoo.com/v1/finance/search?q=${isin}`;
            const sRes = await fetch(proxy + encodeURIComponent(sUrl));
            const sData = await sRes.json();
            const ticker = sData.quotes[0].symbol;

            document.getElementById('isinDisplay').innerText = isin;
            document.getElementById('tickerDisplay').innerText = ticker;

            const hUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?range=6mo&interval=1d`;
            const hRes = await fetch(proxy + encodeURIComponent(hUrl));
            const hData = await hRes.json();
            
            const res = hData.chart.result[0];
            const meta = res.meta;
            
            // Riempimento dati
            document.getElementById('p-val').innerText = meta.regularMarketPrice + " " + meta.currency;
            document.getElementById('exch-val').innerText = meta.exchangeName;

            const cData = res.timestamp.map((t, i) => ({
                time: t, open: res.indicators.quote[0].open[i],
                high: res.indicators.quote[0].high[i], low: res.indicators.quote[0].low[i],
                close: res.indicators.quote[0].close[i]
            })).filter(d => d.open != null);

            if (chart) chart.remove();
            chart = LightweightCharts.createChart(document.getElementById('chart'), {
                layout: { backgroundColor: '#1e1e1e', textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#2b2b2b' }, horzLines: { color: '#2b2b2b' } }
            });
            candleSeries = chart.addCandlestickSeries();
            candleSeries.setData(cData);
            chart.timeScale().fitContent();

        } catch (e) { console.error(e); }
    }

    function change(step) {
        idx += step;
        if (idx >= items.length) idx = 0;
        loadStock(items[idx]);
    }

    loadStock(items[idx]);
</script>
</body>
</html>
