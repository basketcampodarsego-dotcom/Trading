<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portafoglio</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
</head>

<body>

<div class="menu">
  <a href="index.html">Dashboard</a>
  <a href="portfolio.html">Portafoglio</a>
</div>

<h2>Portafoglio</h2>

<!-- AGGIUNTA -->
<div class="box">
  <input id="p_ticker" placeholder="Ticker (es: ENEL.MI)">
  <input id="p_qty" placeholder="Quantità" type="number">
  <input id="p_price" placeholder="Prezzo acquisto" type="number">
  <button onclick="addPosition()">Aggiungi</button>
</div>

<!-- TABELLA -->
<table id="portfolioTable">
  <thead>
    <tr>
      <th>Ticker</th>
      <th>Qty</th>
      <th>Prezzo</th>
      <th>Attuale</th>
      <th>Valore</th>
      <th>P/L</th>
      <th></th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script src="portfolio.js"></script>

</body>
</html>
