<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trading PAC PRO MAX</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<script defer src="app.js"></script>
</head>

<body>

<div class="card">

  <div class="version">PRO MAX</div>

  <div class="topbar">

    <input id="searchInput"
           placeholder="Cerca titolo o ticker..."
           oninput="liveSearchInput()" />

    <div id="searchResults"></div>

    <button onclick="cerca()">GO</button>
    <button onclick="buyAsset()">BUY</button>

  </div>

  <div id="status"></div>

  <div id="assetName"></div>
  <div id="isinTicker"></div>

  <div id="signal"></div>
  <div id="metrics"></div>

  <div id="strategyBox"></div>

  <div id="chart" style="height:400px;"></div>

  <hr>

  <h3>💼 PORTAFOGLIO</h3>

  <div id="portfolio"></div>
  <div id="portfolioTotal"></div>

  <div class="nav">
    <button onclick="nav(-1)">⬅</button>
    <button onclick="nav(1)">➡</button>
  </div>

</div>

</body>
</html>
