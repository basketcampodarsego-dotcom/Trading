<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trading Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
</head>

<body>

<div class="menu">
  <a href="index.html">Dashboard</a>
  <a href="portfolio.html">Portafoglio</a>
  <a href="backtest.html">Analisi</a>
  <a href="report.html">Report</a>
  <button onclick="toggleConfig()">⚙️</button>
</div>

<!-- CONFIG -->
<div id="configBox" style="display:none;padding:10px;background:#111;">
  <div>Seleziona file titoli:</div>

  <select id="csvSelector" onchange="changeCSV()">
    <option value="Titoli.csv">Titoli.csv</option>
    <option value="Titoli2.csv">Titoli2.csv</option>
    <option value="ETF.csv">ETF.csv</option>
  </select>
</div>

<div class="header">
  <div>
    <h2 id="title">Loading...</h2>
    <small id="ticker"></small>
  </div>
  <div id="signal"></div>
</div>

<div style="display:flex; gap:8px; padding:10px;">
  <input id="search" placeholder="Cerca nome, ticker o ISIN..." style="flex:1;">
  <button onclick="searchAsset()">Cerca</button>
</div>

<div id="searchInfo" style="padding:5px 10px; font-size:12px;"></div>

<div id="fundamentals" style="padding:10px;"></div>

<div id="chart"></div>

<!-- BOTTONI SOTTO GRAFICO -->
<div class="nav-bottom">
  <button onclick="nav(-1)">◀ Precedente</button>
  <button onclick="nav(1)">Successivo ▶</button>
</div>

<script src="app.js"></script>

</body>
</html>
