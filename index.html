<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Trading Dashboard</title>

<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
</head>

<body>

<!-- ⚠️ IL TUO MENU RESTA IDENTICO -->
<div class="menu">
  <a href="index.html">Dashboard</a>
  <a href="portfolio.html">Portafoglio</a>
  <a href="report.html">Report</a>
  <button onclick="toggleConfig()">⚙️</button>
</div>

<div class="header">
  <h2 id="title">--</h2>
  <div id="ticker"></div>
</div>

<div style="display:flex; gap:8px; padding:10px;">
  <input id="search" placeholder="Cerca..." style="flex:1;">
  <button onclick="searchAsset()">Cerca</button>
</div>

<div id="chart"></div>

<div class="nav-bottom">
  <button onclick="nav(-1)">◀</button>
  <button onclick="nav(1)">▶</button>
</div>

<!-- ✅ NUOVO PANNELLO STABILE -->
<div id="infoPanel">
  <div id="signal"></div>
  <div id="tech"></div>
  <div id="fund"></div>
</div>

<script src="app.js"></script>
</body>
</html>
